apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: frontend-vs
  namespace: default
spec:
  hosts:
  - "*"
  gateways:
  - frontend-gateway

  http:

  # 🔥 Backend routes
  - match:
    - uri:
        prefix: /count
    route:
    - destination:
        host: backend-service
        port:
          number: 3000

  - match:
    - uri:
        prefix: /greet
    route:
    - destination:
        host: backend-service
        port:
          number: 3000

  - match:
    - uri:
        prefix: /data
    route:
    - destination:
        host: backend-service
        port:
          number: 3000

  - match:
    - uri:
        prefix: /reset
    route:
    - destination:
        host: backend-service
        port:
          number: 3000

  # 🌐 Frontend route (default)
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: frontend-service
        port:
          number: 80
